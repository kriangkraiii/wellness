services:
  postgres:
    image: postgres:16
    container_name: wellness-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wellness
    ports:
      - "5433:5432"
    volumes:
      - wellness-postgres-data:/var/lib/postgresql/data

volumes:
  wellness-postgres-data:
